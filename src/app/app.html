<main>
  <div class="player-container">
    <app-stream-player
      [streamUrl]="streamUrl"
      [streamName]="'Channel 5'"
      [autoplay]="true"
      [muted]="false"
      [controls]="true"
      (playerState)="onPlayerState($event)"
      (error)="onPlayerError($event)"
    />
  </div>
</main>

<div class="stream-layer">
  <div class="layer">
    <div class="layer-channel">
      <img class="layer-channel__logo" [src]="channelLogo()" alt="channel-logo">
      <p class="layer-channel__name">{{ channelName() }}</p>
    </div>
    <div class="layer-info" *ngIf="programs() && programs().length > 0">
      <div class="card-info" *ngFor="let program of programs()">
        <div class="card-info-title">
          <p>{{ program.label }}</p>
          <p>{{ program.time }} - {{ program.endTime }}</p>
        </div>
        <div class="card-info-description" #descRef>
          <p>{{ program.title }}</p>
        </div>
        <div class="card-info-timeline">
          <div class="card-info-timeline-progress" [style.width.%]="getProgress(program.time, program.endTime)"></div>
        </div>
      </div>
    </div>
    <div class="layer-controls">
      <div class="layer-controls-left">
        <button class="control-btn" type="button" title="Play/Pause" (click)="togglePlay()">
          <svg *ngIf="!isPlaying()" class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg *ngIf="isPlaying()" class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <div class="volume-control">
          <button class="control-btn" type="button" title="Volumen" (click)="toggleMute()">
            <svg *ngIf="!isMuted()" class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
            </svg>
            <svg *ngIf="isMuted()" class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
            </svg>
          </button>
          <input type="range" class="volume-slider" min="0" max="100" [value]="volume()"
            [style.--progress]="volume() + '%'" (input)="onVolumeChange($event)" />
        </div>
      </div>
      <div class="layer-controls-right">
        <span class="live-badge">EN VIVO</span>
      </div>
    </div>
  </div>
</div>

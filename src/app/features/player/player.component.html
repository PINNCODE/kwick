<main tabindex="0" (keydown.arrowLeft)="toggleMenuLayer()" (keydown.enter)="toggleStreamLayer()" (keydown.arrowUp)="onArrowUp($event)" (keydown.arrowDown)="onArrowDown($event)">
  <div class="player-container">
    <app-menu-layer
      [class.layer-hidden]="activeLayer() !== 'menu'"
      [username]="userName()"
      [initial]="userInitial()"
      (channelChangeRequested)="onChannelChange($event)"
    ></app-menu-layer>
    <app-stream-layer
      [class.layer-hidden]="activeLayer() !== 'stream'"
      [isPlaying]="isPlaying()"
      [isMuted]="isMuted()"
      [volume]="volume()"
      [programs]="programs()"
      [channelName]="channelName()"
      [channelLogo]="channelLogo()"
      (togglePlayPause)="onTogglePlayPause()"
      (toggleMuteUnmute)="onToggleMute()"
      (volumeChange)="onVolumeChange($event)"
    ></app-stream-layer>
    <app-stream-player
      #streamPlayer
      [streamUrl]="streamUrl()"
      [streamName]="channelName()"
      [muted]="false"
      [controls]="false"
      (playerState)="onPlayerState($event)"
      (errorOccurred)="onPlayerError($event)"
    />
  </div>
</main>
